<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skilled Trades & Courses | Excellence ITI</title>
    <link rel="manifest" href="../public/manifest.json">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brandBlue: '#0B3C91', brandGold: '#F4B400' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <!-- Global CSS -->
    <link rel="stylesheet" href="../assets/css/globals.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Components Loader -->
    <script src="../assets/js/components.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-x-hidden transition-colors dark:bg-slate-900 dark:text-slate-200">

    <!-- Sticky Header & Mega Nav -->
    <div id="header-placeholder"></div>

    <!-- Page Header -->
    <section class="relative bg-brandBlue text-white py-24 px-6 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0?q=80&w=2070&auto=format&fit=crop')] opacity-10 mix-blend-overlay"></div>
        <div class="max-w-7xl mx-auto relative z-10 text-center space-y-4 animate-fade-in-up">
            <h1 class="text-5xl font-poppins font-black tracking-tight">Technical Trades</h1>
            <p class="text-blue-200 text-lg max-w-2xl mx-auto font-light">Explore our industry-aligned NCVT approved technical programs designed for 100% employability.</p>
        </div>
    </section>

    <!-- Search & Filters -->
    <section class="py-12 px-6 max-w-7xl mx-auto">
        <div class="bg-white/95 backdrop-blur-md border border-slate-200 rounded-[2rem] p-6 flex flex-col md:flex-row gap-6 items-center justify-between shadow-soft">
            <div class="relative w-full md:w-1/2">
                <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" placeholder="Search trades (e.g., Electrician, Fitter)..." class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl pl-12 pr-4 py-4 focus:outline-none focus:border-brandBlue focus:ring-1 focus:ring-brandBlue transition-all">
            </div>
            <div class="flex gap-4 w-full md:w-auto overflow-x-auto no-scrollbar pb-2 md:pb-0">
                <button class="bg-brandBlue text-white px-6 py-3 rounded-full text-sm font-bold whitespace-nowrap shadow-md">All Trades</button>
                <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-6 py-3 rounded-full text-sm font-bold whitespace-nowrap transition-colors">Engineering</button>
                <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-6 py-3 rounded-full text-sm font-bold whitespace-nowrap transition-colors">Non-Engineering</button>
                <button class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-6 py-3 rounded-full text-sm font-bold whitespace-nowrap transition-colors">Short-term</button>
            </div>
        </div>
    </section>

    <!-- Course Cards Grid -->
    <section class="pb-24 px-6 max-w-7xl mx-auto">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="coursesGrid">
            
            <div class="col-span-full text-center text-slate-500 py-10" id="coursesLoading">
                Loading trades...
            </div>

        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Interactive Scripts -->
    <script src="../assets/js/i18n-data.js"></script>
    <script src="../assets/js/premium-features.js"></script>
    <script src="../assets/js/pwa-setup.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const coursesGrid = document.getElementById('coursesGrid');
            const trades = JSON.parse(localStorage.getItem('itiTrades') || '[]');
            
            if(trades.length === 0) {
                coursesGrid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">No trades have been added yet. Admins can add trades from the dashboard.</div>';
                return;
            }

            const images = [
                'https://images.unsplash.com/photo-1621905251189-08b45d6a269e?q=80&w=2069&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?q=80&w=2070&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1486262715619-673956004ea0?q=80&w=2070&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop'
            ];

            coursesGrid.innerHTML = trades.map((t, index) => {
                const img = images[index % images.length];
                return `
                <div class="bg-white rounded-[2rem] p-4 shadow-soft border border-slate-100 group hover:-translate-y-2 transition-all duration-300">
                    <div class="relative h-56 rounded-3xl overflow-hidden mb-6">
                        <img src="${img}" alt="${t.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full text-xs font-bold text-brandBlue shadow-sm"><i class="fa-regular fa-clock mr-1"></i> ${t.duration}</div>
                        <div class="absolute bottom-4 left-4 bg-brandBlue/90 backdrop-blur text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-sm">NCVT Approved</div>
                    </div>
                    <div class="px-4 pb-4">
                        <h3 class="text-2xl font-poppins font-bold text-slate-900 mb-2">${t.name}</h3>
                        <p class="text-slate-600 text-sm mb-6 line-clamp-2">Industry-aligned technical training in ${t.name} with practical exposure and modern facilities.</p>
                        
                        <div class="grid grid-cols-2 gap-y-4 gap-x-2 text-sm mb-8 border-t border-b border-slate-100 py-4">
                            <div><span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Eligibility</span> <span class="font-semibold text-slate-700">10th Pass</span></div>
                            <div><span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Total Seats</span> <span class="font-semibold text-slate-700">${t.seats || 40} Units</span></div>
                            <div><span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Course Fee</span> <span class="font-semibold text-brandBlue">Contact Admin</span></div>
                            <div><span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Department</span> <span class="font-semibold text-slate-700">Technical</span></div>
                        </div>
                        
                        <a href="admission.html" class="block w-full text-center bg-slate-900 text-white py-4 rounded-2xl font-semibold hover:bg-brandBlue transition-colors shadow-md">Apply For Admission</a>
                    </div>
                </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
